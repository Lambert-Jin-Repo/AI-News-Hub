name: Scheduled Jobs

on:
  schedule:
    # Fetch news every 12 hours (UTC: 00:00, 12:00)
    - cron: "0 0,12 * * *"
    # Summarise pending articles every 2 hours
    - cron: "0 */2 * * *"
    # Generate daily digest at 00:00 UTC (08:00 AWST)
    - cron: "0 0 * * *"
    # Generate daily word at 22:00 UTC (06:00 AWST)
    - cron: "0 22 * * *"
    # Refresh all daily words on 1st and 16th of each month
    - cron: "0 0 1,16 * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        type: choice
        options:
          - fetch-news
          - summarise
          - daily-digest
          - generate-daily-word
          - refresh-daily-words

jobs:
  fetch-news:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fetch-news' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0,12 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fetch-news
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/fetch-news"

  summarise:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'summarise' ||
      github.event_name == 'schedule' && github.event.schedule == '0 */2 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger summarise
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/summarise"

  daily-digest:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-digest' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-digest
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/daily-digest"

  generate-daily-word:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'generate-daily-word' ||
      github.event_name == 'schedule' && github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger generate-daily-word
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/generate-daily-word"

  refresh-daily-words:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'refresh-daily-words' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 1,16 * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-daily-words
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/refresh-daily-words"
