name: Scheduled Jobs

on:
  schedule:
    # Fetch news every 12 hours at 6 AM / 6 PM AWST (UTC: 22:00, 10:00)
    - cron: "0 22,10 * * *"
    # Summarise 30 min after each fetch (UTC: 22:30, 10:30)
    - cron: "30 22,10 * * *"
    # Generate daily digest at 23:00 UTC (07:00 AWST)
    - cron: "0 23 * * *"
    # Generate daily word at 22:00 UTC (06:00 AWST)
    - cron: "0 22 * * *"
    # Refresh all daily words on 1st and 16th of each month
    - cron: "0 0 1,16 * *"
    # Discover new AI tools weekly — Monday 2 AM AWST (UTC: 18:00 Sunday)
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        type: choice
        options:
          - fetch-news
          - summarise
          - daily-digest
          - generate-daily-word
          - refresh-daily-words
          - discover-tools

jobs:
  fetch-news:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fetch-news' ||
      github.event_name == 'schedule' && github.event.schedule == '0 22,10 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fetch-news
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/fetch-news"

  summarise:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'summarise' ||
      github.event_name == 'schedule' && github.event.schedule == '30 22,10 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger summarise
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/summarise"

  daily-digest:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-digest' ||
      github.event_name == 'schedule' && github.event.schedule == '0 23 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-digest
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/daily-digest"

  generate-daily-word:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'generate-daily-word' ||
      github.event_name == 'schedule' && github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger generate-daily-word
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/generate-daily-word"

  refresh-daily-words:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'refresh-daily-words' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 1,16 * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-daily-words
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/refresh-daily-words"

  discover-tools:
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'discover-tools' ||
      github.event_name == 'schedule' && github.event.schedule == '0 18 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger discover-tools
        run: |
          curl -s -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CLOUD_RUN_URL }}/api/jobs/discover-tools"
